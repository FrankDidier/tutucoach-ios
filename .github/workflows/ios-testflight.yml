name: iOS TestFlight

# Builds the iOS app with Xcode 26 (iOS 26 SDK, required by Apple since
# 2026-04-28) and uploads it to TestFlight via the App Store Connect API.
# Trigger manually from the Actions tab, or on pushes that touch the app.

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'ios/**'
      - 'src/**'
      - 'index.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ios-testflight.yml'

concurrency:
  group: ios-testflight
  cancel-in-progress: false

jobs:
  build-upload:
    runs-on: macos-15
    timeout-minutes: 120
    env:
      SCHEME: TutuCoachRN
      WORKSPACE: ios/TutuCoachRN.xcworkspace
      BUNDLE_ID: com.impit.tutucoach
      PROFILE_NAME: "TutuCoach AppStore"
      TEAM_ID: 6GAG9LR66G
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26 (iOS 26 SDK)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'

      - name: Print toolchain
        run: |
          xcodebuild -version
          echo "iOS SDK: $(xcrun --sdk iphoneos --show-sdk-version)"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Install CocoaPods dependencies
        working-directory: ios
        run: |
          gem install cocoapods --no-document
          pod install --repo-update

      - name: Import signing certificate & profile
        env:
          CERT_P12_BASE64: ${{ secrets.BUILD_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.BUILD_CERT_PASSWORD }}
          PROVISION_BASE64: ${{ secrets.BUILD_PROVISION_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/dist.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"

          echo "$CERT_P12_BASE64"   | base64 --decode > "$CERT_PATH"
          echo "$PROVISION_BASE64"  | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed s/\"//g)
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Archive
        run: |
          set -euo pipefail
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/$SCHEME.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
            clean archive

      - name: Export signed IPA
        run: |
          set -euo pipefail
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/$SCHEME.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist ios/ExportOptions.plist

      - name: Upload to TestFlight
        env:
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          echo "$ASC_KEY_P8_BASE64" | base64 --decode > "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          IPA="$RUNNER_TEMP/export/$SCHEME.ipa"
          # altool 偶发对 Apple 服务器超时（-1001），单次失败不代表构建有问题。
          # 重试最多 3 次；全部失败才让这一步（以及整个 job）明确失败，避免
          # 「CI 绿灯但 TestFlight 里根本没有这个构建」的静默丢包。
          attempt=1
          max=3
          until [ "$attempt" -gt "$max" ]; do
            echo "== Upload attempt $attempt/$max =="
            if xcrun altool --upload-app \
                 -f "$IPA" -t ios \
                 --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"; then
              echo "Upload succeeded on attempt $attempt"
              exit 0
            fi
            echo "Upload attempt $attempt failed; retrying in 60s..."
            attempt=$((attempt+1))
            sleep 60
          done
          echo "::error::altool upload failed after $max attempts"
          exit 1

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TutuCoachRN-ipa
          path: ${{ runner.temp }}/export/*.ipa
          if-no-files-found: ignore
